<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - E-Learning Platform</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <i class="fas fa-graduation-cap"></i> EduLearn
            </div>
            <ul class="nav-links">
                <li><a href="Dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="Courses.html" class="active"><i class="fas fa-book"></i> Courses</a></li>
                <li><a href="Quiz.html"><i class="fas fa-question-circle"></i> Quiz</a></li>
                <li><a href="Profile.html"><i class="fas fa-user"></i> Profile</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="breadcrumb">
            <ul>
                <li><a href="Dashboard.html">Home</a></li>
                <li><a href="Courses.html">Courses</a></li>
                <li>All Courses</li>
            </ul>
        </section>

        <h1 class="text-center mb-2">Available Courses</h1>
        
        <div class="course-table">
            <table>
                <thead>
                    <tr>
                        <th>Course Name</th>
                        <th>Category</th>
                        <th>Difficulty</th>
                        <th>Duration</th>
                        <th>Lessons</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="courses-table-body">
                    <!-- Courses will be dynamically loaded here -->
                </tbody>
            </table>
        </div>

        <div class="mt-2">
            <h2 class="text-center mb-1">Course Details</h2>
            <div id="course-details" class="course-container">
                <!-- Course cards will be displayed here -->
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 EduLearn Platform. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // Initialize Courses Page
        document.addEventListener('DOMContentLoaded', function() {
            loadCourses();
        });

        function loadCourses() {
            const userData = JSON.parse(localStorage.getItem('userData')) || {
                coursesCompleted: [],
                coursesInProgress: []
            };
            
            // Populate courses table
            populateCoursesTable(userData);
            
            // Display course cards
            displayCourseCards(userData);
        }

        function populateCoursesTable(userData) {
            const tableBody = document.getElementById('courses-table-body');
            tableBody.innerHTML = '';
            
            courses.forEach(course => {
                const row = document.createElement('tr');
                
                const isCompleted = userData.coursesCompleted.includes(course.id);
                const inProgress = userData.coursesInProgress.includes(course.id);
                
                let status = 'Not Started';
                let statusClass = 'status-not-started';
                let actionButton = `<button class="btn" onclick="startCourse(${course.id})">Start Course</button>`;
                
                if (isCompleted) {
                    status = 'Completed';
                    statusClass = 'status-completed';
                    actionButton = `<button class="btn btn-success" disabled><i class="fas fa-check"></i> Completed</button>`;
                } else if (inProgress) {
                    status = 'In Progress';
                    statusClass = 'status-in-progress';
                    actionButton = `<button class="btn btn-secondary" onclick="continueCourse(${course.id})">Continue</button>`;
                }
                
                row.innerHTML = `
                    <td><strong>${course.title}</strong></td>
                    <td>${course.category}</td>
                    <td><span class="difficulty-badge difficulty-${course.difficulty}">${course.difficulty}</span></td>
                    <td>${course.duration}</td>
                    <td>${course.lessons.length}</td>
                    <td><span class="${statusClass}">${status}</span></td>
                    <td>${actionButton}</td>
                `;
                
                tableBody.appendChild(row);
            });
        }

        function displayCourseCards(userData) {
            const container = document.getElementById('course-details');
            container.innerHTML = '';
            
            courses.forEach(course => {
                const card = createDetailedCourseCard(course, userData);
                container.appendChild(card);
            });
        }

        function createDetailedCourseCard(course, userData) {
            const card = document.createElement('div');
            card.className = 'course-card';
            card.setAttribute('data-difficulty', course.difficulty);
            
            const isCompleted = userData.coursesCompleted.includes(course.id);
            const inProgress = userData.coursesInProgress.includes(course.id);
            
            let statusIcon = '';
            let statusText = '';
            
            if (isCompleted) {
                statusIcon = '<i class="fas fa-check-circle" style="color: #43e97b;"></i>';
                statusText = 'Completed';
            } else if (inProgress) {
                statusIcon = '<i class="fas fa-clock" style="color: #ffa726;"></i>';
                statusText = 'In Progress';
            } else {
                statusIcon = '<i class="fas fa-play-circle" style="color: #667eea;"></i>';
                statusText = 'Not Started';
            }
            
            card.innerHTML = `
                <div class="course-card-header">
                    <h3>${course.title}</h3>
                    <p>${statusIcon} ${statusText}</p>
                </div>
                <div class="course-card-body">
                    <p><strong>Description:</strong> ${course.description}</p>
                    <p><strong>Category:</strong> ${course.category}</p>
                    <p><strong>Difficulty:</strong> ${course.difficulty}</p>
                    <p><strong>Duration:</strong> ${course.duration}</p>
                    <p><strong>Instructor:</strong> ${course.instructor}</p>
                    
                    <h4>Lessons:</h4>
                    <ol class="lesson-list">
                        ${course.lessons.map(lesson => `<li>${lesson.title} - ${lesson.duration}</li>`).join('')}
                    </ol>
                    
                    <div class="mt-1">
                        ${isCompleted ? 
                            '<button class="btn btn-success" disabled><i class="fas fa-check"></i> Completed</button>' :
                            inProgress ?
                            `<button class="btn btn-secondary" onclick="continueCourse(${course.id})">Continue Learning</button>` :
                            `<button class="btn" onclick="startCourse(${course.id})">Start Course</button>`
                        }
                    </div>
                </div>
            `;
            
            return card;
        }

        function startCourse(courseId) {
            const userData = JSON.parse(localStorage.getItem('userData')) || {
                coursesCompleted: [],
                coursesInProgress: [],
                quizResults: [],
                totalScore: 0,
                streak: 0,
                studyTime: 0
            };
            
            // Add course to in progress
            if (!userData.coursesInProgress.includes(courseId)) {
                userData.coursesInProgress.push(courseId);
            }
            
            // Save to localStorage
            localStorage.setItem('userData', JSON.stringify(userData));
            
            // Show success message
            showNotification('Course started successfully! Good luck with your learning journey.');
            
            // Reload the page to update the UI
            setTimeout(() => {
                loadCourses();
            }, 1000);
        }

        function continueCourse(courseId) {
            const course = courses.find(c => c.id === courseId);
            showNotification(`Continuing "${course.title}". Keep up the great work!`);
        }

        function showNotification(message) {
            // Create notification element
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.innerHTML = `
                <i class="fas fa-check-circle"></i>
                <span>${message}</span>
            `;
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
                color: white;
                padding: 1rem 1.5rem;
                border-radius: 10px;
                box-shadow: 0 5px 20px rgba(67, 233, 123, 0.4);
                z-index: 10000;
                display: flex;
                align-items: center;
                gap: 0.5rem;
                animation: slideIn 0.3s ease-out;
            `;
            
            document.body.appendChild(notification);
            
            // Remove notification after 3 seconds
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 3000);
        }

        // Add notification animations to styles
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            
            @keyframes slideOut {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(100%);
                    opacity: 0;
                }
            }
            
            .difficulty-badge {
                padding: 0.25rem 0.75rem;
                border-radius: 15px;
                font-size: 0.8rem;
                font-weight: bold;
            }
            
            .difficulty-beginner {
                background: #e8f5e8;
                color: #2e7d32;
            }
            
            .difficulty-intermediate {
                background: #fff3e0;
                color: #f57c00;
            }
            
            .difficulty-advanced {
                background: #ffebee;
                color: #c62828;
            }
            
            .status-not-started {
                color: #666;
            }
            
            .status-in-progress {
                color: #f57c00;
                font-weight: bold;
            }
            
            .status-completed {
                color: #2e7d32;
                font-weight: bold;
            }
            
            .lesson-list {
                padding-left: 1.5rem;
                margin: 0.5rem 0;
            }
            
            .lesson-list li {
                margin-bottom: 0.25rem;
                color: #555;
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
